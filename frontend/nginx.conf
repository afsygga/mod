server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html (и все не-хэшированные пути) — всегда ревалидировать:
    # после деплоя старый HTML ссылается на удалённые хэш-бандлы → белый
    # экран, пока эвристический кэш браузера не истечёт. ETag делает
    # ревалидацию дешёвой (304 без тела).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Хэшированные бандлы неизменяемы — кэшировать навсегда
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
}
