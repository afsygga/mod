

services:
  db:
    image: postgres:15-alpine
    container_name: twitchmod_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-twitchmod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twitchmod_secret}
      POSTGRES_DB: ${POSTGRES_DB:-twitchmod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twitchmod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/afsygga/afs-backend:latest
    container_name: twitchmod_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-twitchmod}:${POSTGRES_PASSWORD:-twitchmod_secret}@db:5432/${POSTGRES_DB:-twitchmod}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      TWITCH_BOT_USERNAME: ${TWITCH_BOT_USERNAME}
      TWITCH_BOT_OAUTH: ${TWITCH_BOT_OAUTH}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  frontend:
    image: ghcr.io/afsygga/afs-frontend:latest
    container_name: twitchmod_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
